<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
    <linearGradient id="dll" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="12" fill="url(#bg)"/>
  <rect width="600" height="200" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- DLL block icon -->
  <g transform="translate(40, 50)">
    <!-- Original DLL (faded) -->
    <rect x="0" y="20" width="36" height="80" rx="4" fill="#30363d" opacity="0.5"/>
    <text x="18" y="65" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">.dll</text>

    <!-- Arrow -->
    <path d="M 44 60 L 62 60" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="62,55 72,60 62,65" fill="#58a6ff"/>

    <!-- Proxy DLL (active) -->
    <rect x="78" y="10" width="40" height="80" rx="4" fill="url(#dll)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="98" y="42" font-family="monospace" font-size="7" fill="#e6edf3" text-anchor="middle">PROXY</text>
    <text x="98" y="55" font-family="monospace" font-size="7" fill="#e6edf3" text-anchor="middle">.dll</text>
    <!-- Payload indicator -->
    <circle cx="98" cy="72" r="6" fill="#f778ba" opacity="0.8"/>
    <text x="98" y="75" font-family="monospace" font-size="7" fill="#0d1117" text-anchor="middle">!</text>
  </g>

  <!-- Title -->
  <text x="195" y="85" font-family="'SF Mono', 'Fira Code', monospace" font-size="52" font-weight="bold" fill="url(#accent)">LACUNA</text>

  <!-- Subtitle -->
  <text x="197" y="115" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#8b949e">DLL Sideload Discovery Tool</text>

  <!-- Tag line -->
  <text x="197" y="145" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff">one scan. dozens of hijacks. zero procmon clicking.</text>

  <!-- Bottom accent bar -->
  <rect x="40" y="175" width="520" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
